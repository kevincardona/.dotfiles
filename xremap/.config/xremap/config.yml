keymap:
  # Existing mappings remain the same
  - name: "Cmd + 1-9 to Ctrl + 1-9"
    remap:
      Super_L-1: C-1
      Super_L-2: C-2
      Super_L-3: C-3
      Super_L-4: C-4
      Super_L-5: C-5
      Super_L-6: C-6
      Super_L-7: C-7
      Super_L-8: C-8
      Super_L-9: C-9

  # Window Management Mappings
  - name: "Remap Cmd + Alt + H/J/K/L to Win + Arrow Keys"
    remap:
      SUPER-M-H: SUPER-Left
      SUPER-M-J: SUPER-Down
      SUPER-M-K: SUPER-Up
      SUPER-M-L: SUPER-Right

  # New Vim-style Navigation with Super Key
  - name: "Super + H/J/K/L for Arrow Key Navigation"
    remap:
      Super_L-H: Left
      Super_L-J: Down
      Super_L-K: Up
      Super_L-L: Right

 # option + h/j/k/l for arrow key navigation
  - name: "Option + H/J/K/L for Arrow Key Navigation"
    remap:
      Alt_L-H: Left
      Alt_L-J: Down
      Alt_L-K: Up
      Alt_L-L: Right

  # Other existing mappings
  - name: "Shift + Escape -> ~"
    remap:
      Shift-Esc: Shift-KEY_GRAVE
